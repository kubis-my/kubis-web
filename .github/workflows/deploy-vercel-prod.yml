name: Production Deploy (Vercel)

on:
    push:
        branches:
            - release

jobs:
    deploy-sso:
        name: Deploy SSO to Vercel
        runs-on: ubuntu-latest
        environment: production
        env:
            VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_SSO }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: pnpm add -g vercel@latest

            - name: Pull Vercel environment
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

    deploy-forge:
        name: Deploy Forge to Vercel
        runs-on: ubuntu-latest
        environment: production
        needs: [deploy-sso]
        env:
            VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_FORGE }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: pnpm add -g vercel@latest

            - name: Pull Vercel environment
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

    deploy-main:
        name: Deploy Main to Vercel
        runs-on: ubuntu-latest
        environment: production
        needs: [deploy-sso]
        env:
            VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
            VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MAIN }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Vercel CLI
              run: pnpm add -g vercel@latest

            - name: Pull Vercel environment
              run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

            - name: Build
              run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

            - name: Deploy
              run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

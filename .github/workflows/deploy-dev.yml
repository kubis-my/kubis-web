name: Development Deploy

on:
  push:
    branches:
      - "**"
      - "!main" # Exclude main branch

jobs:
  deploy-sso-dev:
    uses: ./.github/workflows/deploy-app.yml
    with:
      app_name: sso-dev
      service_name: sso
      environment: development
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      NEXT_PUBLIC_AUTH_URL: ${{ vars.NEXT_PUBLIC_AUTH_URL }}
      NEXT_PUBLIC_MAIN_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_MAIN_APP_BASE_URL }}
      NEXT_PUBLIC_SSO_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_SSO_APP_BASE_URL }}
      NEXT_PUBLIC_MAIN_CLIENT_ID: ${{ vars.NEXT_PUBLIC_MAIN_CLIENT_ID }}

  deploy-main-dev:
    uses: ./.github/workflows/deploy-app.yml
    needs: [deploy-sso-dev]
    with:
      app_name: kubis-dev
      service_name: main
      environment: development
    secrets:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      NEXT_PUBLIC_AUTH_URL: ${{ vars.NEXT_PUBLIC_AUTH_URL }}
      NEXT_PUBLIC_MAIN_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_MAIN_APP_BASE_URL }}
      NEXT_PUBLIC_SSO_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_SSO_APP_BASE_URL }}
      NEXT_PUBLIC_MAIN_CLIENT_ID: ${{ vars.NEXT_PUBLIC_MAIN_CLIENT_ID }}

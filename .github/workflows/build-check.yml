name: Build Check

on:
    push:
        branches-ignore:
            - release

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build
              env:
                  NEXT_PUBLIC_AUTH_URL: 'http://localhost:8000'
                  NEXT_PUBLIC_ACCOUNT_SERVICE_GRAPHQL_URL: 'http://localhost:8000/graphql'
                  NEXT_PUBLIC_SSO_APP_BASE_URL: 'http://localhost:3000'
                  NEXT_PUBLIC_MAIN_CLIENT_ID: '1eKFy7eh9sbXHo68isagb2TM'
                  NEXT_PUBLIC_MAIN_APP_BASE_URL: 'http://localhost:3001'
                  NEXT_PUBLIC_OPS_CLIENT_ID: '1eKFy7eh9sbXHo68isagb3TM'
                  NEXT_PUBLIC_OPS_APP_BASE_URL: 'http://localhost:3002'
                  NEXT_PUBLIC_FORGE_CLIENT_ID: '6Kg4fvBWnmW5v1aHx0jMOffr'
                  NEXT_PUBLIC_FORGE_APP_BASE_URL: 'http://localhost:3003'
                  NEXT_PUBLIC_FORGE_SERVICE_GRAPHQL_URL: 'http://localhost:8002/graphql'

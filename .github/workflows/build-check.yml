name: Build Check

on:
    push:
        branches-ignore:
            - release

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        environment: production
        env:
            NEXT_PUBLIC_AUTH_URL: ${{ vars.NEXT_PUBLIC_AUTH_URL }}
            NEXT_PUBLIC_MAIN_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_MAIN_APP_BASE_URL }}
            NEXT_PUBLIC_SSO_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_SSO_APP_BASE_URL }}
            NEXT_PUBLIC_MAIN_CLIENT_ID: ${{ vars.NEXT_PUBLIC_MAIN_CLIENT_ID }}
            NEXT_PUBLIC_OPS_CLIENT_ID: ${{ vars.NEXT_PUBLIC_OPS_CLIENT_ID }}
            NEXT_PUBLIC_OPS_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_OPS_APP_BASE_URL }}
            NEXT_PUBLIC_FORGE_APP_BASE_URL: ${{ vars.NEXT_PUBLIC_FORGE_APP_BASE_URL }}
            NEXT_PUBLIC_KUBIS_GATEWAY_GRAPHQL_URL: ${{ vars.NEXT_PUBLIC_KUBIS_GATEWAY_GRAPHQL_URL }}
            NEXT_PUBLIC_FORGE_SERVICE_GRAPHQL_URL: ${{ vars.NEXT_PUBLIC_FORGE_SERVICE_GRAPHQL_URL }}
            NEXT_PUBLIC_FORGE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_FORGE_CLIENT_ID }}
            NEXT_PUBLIC_ACCOUNT_SERVICE_GRAPHQL_URL: ${{ vars.NEXT_PUBLIC_ACCOUNT_SERVICE_GRAPHQL_URL }}
            NEXT_PUBLIC_OPS_SERVICE_GRAPHQL_URL: ${{ vars.NEXT_PUBLIC_OPS_SERVICE_GRAPHQL_URL }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v5

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

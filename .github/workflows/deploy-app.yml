name: Deploy App to Fly.io

on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
      service_name:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      FLY_API_TOKEN:
        required: true
      FLY_ORG:
        required: true
      NEXT_PUBLIC_AUTH_URL:
        required: true
      NEXT_PUBLIC_MAIN_APP_BASE_URL:
        required: true
      NEXT_PUBLIC_SSO_APP_BASE_URL:
        required: true
      NEXT_PUBLIC_MAIN_CLIENT_ID:
        required: true
      NEXT_PUBLIC_KUBIS_GATEWAY_GRAPHQL_URL:
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.service_name }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Check if app exists
        id: check-app
        run: |
          if flyctl status --app "${{ inputs.app_name }}" > /dev/null 2>&1; then
            echo "APP_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "APP_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate fly.toml from template
        run: |
          cp fly.prod.toml fly.toml
          sed -i.bak "s/APP_NAME_PLACEHOLDER/${{ inputs.app_name }}/g" fly.toml
          sed -i.bak "s/SERVICE_NAME_PLACEHOLDER/${{ inputs.service_name }}/g" fly.toml
          sed -i.bak "s/REGION_PLACEHOLDER/${{ vars.FLY_REGION }}/g" fly.toml
          rm -f fly.toml.bak

      - name: Create fly app
        if: steps.check-app.outputs.APP_EXISTS == 'false'
        run: flyctl apps create --name "${{ inputs.app_name }}" --org "${{ secrets.FLY_ORG }}"

      - name: Set application secrets
        run: |
          flyctl secrets set -a "${{ inputs.app_name }}" \
            FLY_ORG="${{ secrets.FLY_ORG }}" \
            NEXT_PUBLIC_AUTH_URL="${{ secrets.NEXT_PUBLIC_AUTH_URL }}" \
            NEXT_PUBLIC_MAIN_APP_BASE_URL="${{ secrets.NEXT_PUBLIC_MAIN_APP_BASE_URL }}" \
            NEXT_PUBLIC_SSO_APP_BASE_URL="${{ secrets.NEXT_PUBLIC_SSO_APP_BASE_URL }}" \
            NEXT_PUBLIC_KUBIS_GATEWAY_GRAPHQL_URL="${{ secrets.NEXT_PUBLIC_KUBIS_GATEWAY_GRAPHQL_URL }}" \
            NEXT_PUBLIC_MAIN_CLIENT_ID="${{ secrets.NEXT_PUBLIC_MAIN_CLIENT_ID }}"

      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            -a "${{ inputs.app_name }}" \
            --config "fly.toml" \
            --build-arg APP_NAME="${{ inputs.service_name }}" \
            --build-arg NEXT_PUBLIC_AUTH_URL="${{ secrets.NEXT_PUBLIC_AUTH_URL }}" \
            --build-arg NEXT_PUBLIC_MAIN_APP_BASE_URL="${{ secrets.NEXT_PUBLIC_MAIN_APP_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_SSO_APP_BASE_URL="${{ secrets.NEXT_PUBLIC_SSO_APP_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_MAIN_CLIENT_ID="${{ secrets.NEXT_PUBLIC_MAIN_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_KUBIS_GATEWAY_GRAPHQL_URL="${{ secrets.NEXT_PUBLIC_KUBIS_GATEWAY_GRAPHQL_URL }}" \
            --yes \
            --ha=false

# Fly.io Staging/Development Template
# This file is used for all non-main branches (dev environment)
# Lower performance and availability settings for cost optimization
#
# Variables replaced by CI/CD:
# - app: Set dynamically based on service
# - SERVICE_NAME: Set dynamically based on service being deployed

app = 'APP_NAME_PLACEHOLDER'
primary_region = 'REGION_PLACEHOLDER'

[build]
  dockerfile = "Dockerfile"

  [build.args]
    APP_NAME = "SERVICE_NAME_PLACEHOLDER"

[deploy]
  strategy = 'rolling'

[env]
  APP_ENV = "staging"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = 512
  cpus = 1
